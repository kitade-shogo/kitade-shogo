name: GitHub-Profile-3D-Contrib

on:
  schedule: # 03:00 JST (18:00 UTC) daily
    - cron: "0 18 * * *"
  workflow_dispatch:

# default_workflow_permissions is "read" on this repo; elevate just this scope
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    name: generate-github-profile-3d-contrib
    steps:
      - uses: actions/checkout@v4
      - uses: yoshi389111/github-profile-3d-contrib@v0.9.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USERNAME: ${{ github.repository_owner }}
      - name: Commit & Push
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add -A .
          if git commit -m "chore: generate profile-3d-contrib"; then
            git push
          fi
